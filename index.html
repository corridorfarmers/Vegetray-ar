<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corridor Farmers - A Farm in Every Corner</title>
  
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  
  <style>
    /* Basic styling to make the viewer take up the screen */
    body {
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    
    #header {
      text-align: center;
      padding: 20px;
      background-color: #00c2a0; /* A nice agricultural green */
      color: white;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      flex-grow: 1;
    }

    /* Styling for the custom AR button */
    .ar-button {
      background-color: #ffffff;
      color: #00c2a0;
      padding: 14px 28px;
      border: 2px solid #00c2a0;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div id="header">
  <a href="https://www.corridorfarmers.com" target="_blank" style="text-decoration: none; color: white;">
  <img src="logo.png" alt="Corridor Farmers Logo" style="max-height: 60px; margin-bottom: 10px;">
  <h2 style="margin-top: 0;">"a farm in every corner"</h2>
  </a>
  <p>Place a Vegetray in your space and join Corridor Farmers in growing a farm in every corner..</p>
</div>

  <model-viewer 
    src="https://ar.corridorfarmers.com/vegetray.glb" 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    tone-mapping="neutral" 
    shadow-intensity="1"
    alt="A 3D model of a Corridor Farmers vegetray">
    
    <button slot="ar-button" class="ar-button">
      View in your space
    </button>
    
  </model-viewer>

</body>
</html>
